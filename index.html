<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="apple-mobile-web-app-title" content="Gainz"/>
  <meta name="theme-color" content="#111111"/>
  <title>Gainz</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon.svg"/>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg:          #0b1929;
      --card:        #112240;
      --card2:       #172d50;
      --border:      #1e3d5c;
      --text:        #e8f0fe;
      --muted:       #6b8eaa;
      --accent:      #4ade80;
      --accent-dark: #166534;
      --gold:        #fbbf24;
      --r:           14px;
      --nav-h:       60px;
      --safe-t:      env(safe-area-inset-top, 0px);
      --safe-b:      env(safe-area-inset-bottom, 0px);
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; font-size: 16px; overflow: hidden; }

    /* ── LAYOUT ──────────────────────────────────── */
    #app { height: 100dvh; display: flex; flex-direction: column; }

    .view { display: none; flex-direction: column; height: 100%; }
    .view.active { display: flex; }

    .header {
      padding: 14px 20px 12px;
      padding-top: calc(var(--safe-t) + 14px);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
    }
    .header h1 { font-size: 20px; font-weight: 700; flex: 1; }

    .back-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--card2); border: none; color: var(--text);
      font-size: 20px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; line-height: 1;
    }

    /* user avatar button */
    .user-btn {
      width: 34px; height: 34px; border-radius: 50%;
      border: 2px solid var(--border); background: var(--card2);
      overflow: hidden; cursor: pointer; padding: 0; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .user-btn img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

    .scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--nav-h) + var(--safe-b) + 16px); }

    /* ── LOGIN SCREEN ────────────────────────────── */
    #login-screen {
      position: fixed; inset: 0; background: var(--bg);
      z-index: 500; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    #login-screen.hidden { display: none; }

    .login-card {
      background: var(--card); border-radius: 24px; padding: 44px 28px 36px;
      width: 100%; max-width: 340px; text-align: center;
      border: 1px solid var(--border);
    }
    .login-logo { font-size: 56px; margin-bottom: 16px; }
    .login-title { font-size: 30px; font-weight: 800; margin-bottom: 8px; }
    .login-sub { font-size: 15px; color: var(--muted); line-height: 1.5; margin-bottom: 36px; }
    .google-btn {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; padding: 15px 20px;
      background: #fff; color: #1f1f1f;
      border: none; border-radius: 12px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: background 0.15s;
    }
    .google-btn:active { background: #f0f0f0; }
    .google-btn svg { flex-shrink: 0; }

    /* loading spinner */
    #loading-screen {
      position: fixed; inset: 0; background: var(--bg);
      z-index: 490; display: flex; align-items: center; justify-content: center;
    }
    #loading-screen.hidden { display: none; }
    .spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid var(--border); border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── BOTTOM NAV ──────────────────────────────── */
    #bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: calc(var(--nav-h) + var(--safe-b));
      padding-bottom: var(--safe-b);
      background: #0a1622; border-top: 1px solid var(--border);
      display: flex; z-index: 100;
    }
    #bottom-nav button {
      flex: 1; background: none; border: none; color: var(--muted);
      font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; cursor: pointer; transition: color 0.15s;
    }
    #bottom-nav button.active { color: var(--accent); }
    #bottom-nav button svg { width: 22px; height: 22px; fill: currentColor; }

    /* ── SECTION LABEL ───────────────────────────── */
    .section-label { padding: 18px 20px 8px; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }

    /* ── WELCOME ─────────────────────────────────── */
    .welcome-section {
      padding: 24px 20px 8px;
    }
    .welcome-greeting {
      font-size: 13px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px;
    }
    .welcome-name {
      font-size: 28px; font-weight: 800; line-height: 1.1; margin-bottom: 20px;
      background: linear-gradient(120deg, #e8f0fe 0%, #93c5fd 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .welcome-stats { display: flex; gap: 10px; }
    .welcome-stat {
      flex: 1; background: var(--card); border-radius: 12px;
      padding: 14px 10px; border: 1px solid var(--border); text-align: center;
    }
    .welcome-stat-num { font-size: 24px; font-weight: 800; color: var(--accent); line-height: 1; }
    .welcome-stat-lbl { font-size: 11px; color: var(--muted); font-weight: 600; margin-top: 5px; letter-spacing: 0.3px; }

    /* ── HOME ────────────────────────────────────── */
    .week-grid { padding: 0 16px 8px; display: flex; flex-direction: column; gap: 10px; }

    .day-card {
      background: var(--card); border-radius: var(--r); padding: 16px 18px;
      border: 1.5px solid var(--border); cursor: pointer;
      display: flex; align-items: center; gap: 16px; min-height: 72px;
      transition: transform 0.12s, background 0.12s;
    }
    .day-card:active { transform: scale(0.975); background: var(--card2); }
    .day-card.today { border-color: var(--accent); background: rgba(74,222,128,0.05); }

    .day-badge { font-size: 10px; font-weight: 800; color: var(--muted); width: 38px; text-align: center; letter-spacing: 0.3px; line-height: 1.3; }
    .day-card.today .day-badge { color: var(--accent); }

    .day-info { flex: 1; min-width: 0; }
    .day-info .day-name { font-weight: 600; font-size: 15px; }
    .day-info .day-sub { font-size: 12px; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .day-icon { font-size: 20px; width: 28px; text-align: center; flex-shrink: 0; }

    /* new workout card */
    .new-workout-card {
      background: rgba(74,222,128,0.05); border-radius: var(--r); padding: 16px 18px;
      border: 1.5px dashed var(--accent); cursor: pointer;
      display: flex; align-items: center; gap: 14px; min-height: 64px;
      transition: background 0.12s;
    }
    .new-workout-card:active { background: rgba(74,222,128,0.1); }
    .new-workout-icon { font-size: 22px; width: 38px; text-align: center; flex-shrink: 0; }
    .new-workout-label { flex: 1; font-size: 15px; font-weight: 600; color: var(--accent); }

    /* custom workout card */
    .custom-day-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .icon-btn {
      width: 32px; height: 32px; border-radius: 50%;
      border: none; background: var(--card2); color: var(--muted);
      font-size: 14px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
    }
    .icon-btn:active { background: var(--border); }

    /* ── DAY / EXERCISE LIST ─────────────────────── */
    .ex-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 14px; }

    .ex-card {
      background: var(--card); border-radius: var(--r);
      border: 1.5px solid var(--border); overflow: hidden;
      transition: border-color 0.2s;
    }
    .ex-card.all-done { border-color: var(--accent-dark); }

    .ex-head { padding: 14px 16px 10px; }
    .ex-name { font-weight: 700; font-size: 16px; line-height: 1.3; }
    .ex-note { color: var(--muted); font-size: 13px; font-weight: 400; }
    .ex-meta { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* swap toggle */
    .swap-wrap { margin-top: 10px; }
    .swap-row {
      display: flex; background: var(--card2); border-radius: 9px;
      padding: 3px; gap: 3px;
    }
    .swap-btn {
      flex: 1; padding: 8px 6px; border-radius: 7px; border: none;
      background: none; color: var(--muted); font-size: 12px; font-weight: 600;
      cursor: pointer; text-align: center; line-height: 1.3; transition: all 0.15s;
    }
    .swap-btn.active { background: var(--accent); color: #000; }

    /* beat-this banner */
    .beat-this {
      margin: 0 16px 10px; padding: 9px 13px;
      background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.3);
      border-radius: 9px; font-size: 13px; color: var(--gold); font-weight: 600;
      display: flex; align-items: center; gap: 6px;
    }
    .beat-this.baseline { color: var(--muted); background: transparent; border-color: var(--border); font-weight: 400; font-style: italic; }

    /* sets table */
    .sets-wrap { padding: 0 16px 10px; }
    .sets-head {
      display: grid; grid-template-columns: 22px 42px 1fr 1fr 36px;
      gap: 6px; padding: 0 2px; margin-bottom: 6px;
      font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px;
    }
    .sets-head span:nth-child(2),
    .sets-head span:nth-child(3),
    .sets-head span:nth-child(4) { text-align: center; }

    .set-row {
      display: grid; grid-template-columns: 22px 42px 1fr 1fr 36px;
      gap: 6px; align-items: center; margin-bottom: 8px;
    }
    .set-row:last-child { margin-bottom: 0; }

    .set-num { font-size: 13px; color: var(--muted); font-weight: 700; text-align: center; }

    .set-prev {
      font-size: 14px; font-weight: 700; color: var(--muted);
      text-align: center; background: var(--card2);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 2px; line-height: 1;
    }
    .set-row.is-done .set-prev { opacity: 0.45; }

    .set-input {
      background: var(--card2); border: 1.5px solid var(--border);
      border-radius: 9px; color: var(--text); font-size: 19px; font-weight: 700;
      text-align: center; padding: 10px 4px; width: 100%;
      -webkit-appearance: none; appearance: none;
    }
    .set-input:focus { outline: none; border-color: var(--accent); }
    .set-input::placeholder { color: #3a3a3a; }
    .set-row.is-done .set-input { opacity: 0.45; }

    .check-btn {
      width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--border);
      background: none; color: transparent; font-size: 17px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.15s; flex-shrink: 0;
    }
    .check-btn.checked { background: var(--accent); border-color: var(--accent); color: #000; }

    /* rest timer buttons */
    .rest-row { display: flex; gap: 8px; padding: 6px 16px 14px; }
    .rest-trigger {
      flex: 1; padding: 11px 8px; border-radius: 9px;
      border: 1px solid var(--border); background: var(--card2);
      color: var(--text); font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .rest-trigger:active { background: var(--border); }

    /* complete button */
    .finish-btn {
      margin: 4px 16px 8px; padding: 16px;
      border-radius: var(--r); border: none;
      background: var(--accent); color: #000;
      font-size: 17px; font-weight: 800; letter-spacing: 0.2px;
      cursor: pointer; width: calc(100% - 32px);
    }
    .finish-btn:disabled { opacity: 0.35; pointer-events: none; }

    /* ── BUILD WORKOUT ───────────────────────────── */
    .build-name-input {
      flex: 1; background: transparent; border: none;
      color: var(--text); font-size: 18px; font-weight: 700;
      font-family: inherit; min-width: 0;
    }
    .build-name-input:focus { outline: none; }
    .build-name-input::placeholder { color: var(--muted); }

    .header-save-btn {
      padding: 8px 16px; border-radius: 8px; border: none;
      background: var(--accent); color: #000;
      font-size: 14px; font-weight: 700; cursor: pointer; flex-shrink: 0;
    }

    .build-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 12px; }

    .build-ex-card {
      background: var(--card); border-radius: var(--r);
      border: 1.5px solid var(--border); padding: 14px 16px;
    }
    .build-ex-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
    .build-ex-info { flex: 1; min-width: 0; }
    .build-ex-nm { font-size: 15px; font-weight: 700; }
    .muscle-chip {
      display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 9px;
      border-radius: 50px; background: rgba(74,222,128,0.1);
      color: var(--accent); margin-top: 4px;
    }

    .build-ex-cfg { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .cfg-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }

    .sets-stepper { display: flex; align-items: center; }
    .step-btn {
      width: 38px; height: 42px; border: 1.5px solid var(--border);
      background: var(--card2); color: var(--text); font-size: 20px; cursor: pointer;
      line-height: 1; display: flex; align-items: center; justify-content: center;
    }
    .step-btn:first-child { border-radius: 8px 0 0 8px; }
    .step-btn:last-child  { border-radius: 0 8px 8px 0; }
    .step-val {
      flex: 1; background: var(--card2);
      border-top: 1.5px solid var(--border); border-bottom: 1.5px solid var(--border);
      border-left: none; border-right: none;
      color: var(--text); font-size: 18px; font-weight: 700;
      text-align: center; padding: 10px 4px; line-height: 1;
    }

    .cfg-input {
      width: 100%; background: var(--card2); border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 16px; font-weight: 700;
      text-align: center; padding: 10px 8px; font-family: inherit;
    }
    .cfg-input:focus { outline: none; border-color: var(--accent); }
    .cfg-input::placeholder { color: #444; font-size: 13px; font-weight: 500; }

    .add-ex-btn {
      margin: 4px 16px 16px; padding: 15px;
      border-radius: var(--r); border: 1.5px dashed var(--accent);
      background: rgba(74,222,128,0.05); color: var(--accent);
      font-size: 15px; font-weight: 700; cursor: pointer; width: calc(100% - 32px);
      display: block;
    }
    .add-ex-btn:active { background: rgba(74,222,128,0.1); }

    .build-empty {
      text-align: center; color: var(--muted); font-size: 14px;
      padding: 48px 32px 0; line-height: 1.6;
    }
    .build-empty-icon { font-size: 40px; margin-bottom: 12px; }

    /* ── PICKER OVERLAY ──────────────────────────── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      z-index: 200; display: flex; align-items: flex-end; justify-content: center;
    }
    .overlay.hidden { display: none; }

    .picker-sheet {
      background: var(--card); border-radius: 24px 24px 0 0;
      width: 100%; max-height: 88vh; display: flex; flex-direction: column;
    }
    .picker-drag { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; flex-shrink: 0; }
    .picker-header {
      padding: 14px 20px 0; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    .picker-header h2 { flex: 1; font-size: 18px; font-weight: 700; }
    .picker-close {
      width: 32px; height: 32px; border-radius: 50%;
      border: none; background: var(--card2); color: var(--muted);
      font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    .picker-search {
      margin: 12px 16px 0;
      background: var(--card2); border: 1.5px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 15px;
      padding: 10px 14px; width: calc(100% - 32px); flex-shrink: 0;
      font-family: inherit;
    }
    .picker-search:focus { outline: none; border-color: var(--accent); }
    .picker-search::placeholder { color: #555; }

    .chips-row {
      display: flex; gap: 8px; padding: 10px 16px;
      overflow-x: auto; -webkit-overflow-scrolling: touch; flex-shrink: 0;
    }
    .chips-row::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0; padding: 6px 14px; border-radius: 50px;
      border: 1.5px solid var(--border); background: var(--card2);
      color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer;
      white-space: nowrap;
    }
    .chip.active { border-color: var(--accent); color: var(--accent); background: rgba(74,222,128,0.08); }

    .picker-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 16px calc(16px + var(--safe-b)); }

    .picker-ex-row {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 0; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: opacity 0.15s;
    }
    .picker-ex-row:last-child { border-bottom: none; }
    .picker-ex-row:active { opacity: 0.6; }
    .picker-ex-name { flex: 1; font-size: 15px; font-weight: 500; }
    .picker-add-icon {
      width: 30px; height: 30px; border-radius: 50%;
      border: 2px solid var(--accent); color: var(--accent);
      font-size: 20px; line-height: 1; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; background: none; pointer-events: none;
    }

    .add-custom-row {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 0; cursor: pointer; color: var(--muted);
      font-size: 14px; font-weight: 600; border-top: 1px solid var(--border);
      transition: color 0.15s;
    }
    .add-custom-row:active { color: var(--text); }
    .add-custom-row-icon {
      width: 30px; height: 30px; border-radius: 50%;
      border: 2px dashed var(--border); color: var(--muted);
      font-size: 20px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* ── ADD CUSTOM EXERCISE SHEET ───────────────── */
    .sheet-small {
      background: var(--card); border-radius: 24px 24px 0 0;
      padding: 20px 20px calc(24px + var(--safe-b));
      width: 100%;
    }
    .sheet-drag { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
    .sheet-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .sheet-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 8px; }
    .sheet-input {
      width: 100%; background: var(--card2); border: 1.5px solid var(--border);
      border-radius: 9px; color: var(--text); font-size: 16px;
      padding: 13px 14px; margin-bottom: 16px; font-family: inherit;
    }
    .sheet-input:focus { outline: none; border-color: var(--accent); }
    .sheet-input::placeholder { color: #555; }
    .sheet-save-btn {
      width: 100%; padding: 15px; border-radius: var(--r); border: none;
      background: var(--accent); color: #000;
      font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px;
    }
    .sheet-cancel-btn {
      width: 100%; padding: 13px; border-radius: var(--r);
      border: none; background: var(--card2); color: var(--muted);
      font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 10px;
    }

    /* ── REST TIMER MODAL ────────────────────────── */
    .timer-sheet {
      background: var(--card); border-radius: 24px 24px 0 0;
      padding: 28px 24px calc(28px + var(--safe-b));
      width: 100%; text-align: center;
    }
    .timer-label { font-size: 14px; color: var(--muted); font-weight: 600; margin-bottom: 22px; text-transform: uppercase; letter-spacing: 0.6px; }

    .ring-wrap { position: relative; width: 168px; height: 168px; margin: 0 auto 22px; }
    .ring-wrap svg { transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: var(--border); stroke-width: 9; }
    .ring-fg { fill: none; stroke: var(--accent); stroke-width: 9; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
    .ring-time {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 46px; font-weight: 800; font-variant-numeric: tabular-nums;
    }

    .preset-row { display: flex; gap: 10px; margin-bottom: 14px; }
    .preset-btn {
      flex: 1; padding: 13px 8px; border-radius: 10px;
      border: 1.5px solid var(--border); background: var(--card2);
      color: var(--text); font-size: 16px; font-weight: 700; cursor: pointer;
    }
    .preset-btn.active { border-color: var(--accent); color: var(--accent); }

    .skip-btn {
      width: 100%; padding: 14px; border-radius: 10px;

      appearance: none; -webkit-appearance: none;

      transform: translateX(-50%) translateY(12px);
      background: var(--card2); border: 1px solid var(--border);

// ─── Auth state ───────────────────────────────────
auth.onAuthStateChanged(async (user) => {
  if (user) {
    currentUser = user;
    // Update avatar
    const avatar = document.getElementById('user-avatar');
    if (user.photoURL) avatar.src = user.photoURL;
    // Load data from Firestore then show app
    await loadFromFirestore();
    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('login-screen').classList.add('hidden');
    renderHome();
  } else {
    currentUser = null;

    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('login-screen').classList.remove('hidden');
  }
});

function signInWithGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(() => toast('Sign-in failed — please try again'));
}

function confirmSignOut() {
  if (confirm('Sign out of Gainz?')) auth.signOut();
}

// ─── Firestore sync ───────────────────────────────
async function loadFromFirestore() {
  if (!currentUser) return;
  try {
    const doc = await db.collection('users').doc(currentUser.uid)
                        .collection('data').doc('main').get();
    if (doc.exists) {
      const d = doc.data();
      appData = {
        sessions:        d.sessions        || [],
        bodyweight:      d.bodyweight      || [],
        swaps:           d.swaps           || {},
        customDays:      d.customDays      || [],
        customExercises: d.customExercises || [],
      };
    } else {
      // Migrate any existing localStorage data on first login
      try {
        const local = JSON.parse(localStorage.getItem('gainz_v1') || 'null');
        if (local && (local.sessions?.length || local.bodyweight?.length)) {
          appData = { sessions:[], bodyweight:[], swaps:{}, customDays:[], customExercises:[], ...local };
          await pushToFirestore();
          toast('Local data synced to your account ☁️');
        }
      } catch(e) {}
    }
  } catch(e) {
    console.error('Firestore load failed:', e);
    toast('Could not load cloud data — working offline');
  }
}

async function pushToFirestore() {
  if (!currentUser) return;
  try {
    await db.collection('users').doc(currentUser.uid)
            .collection('data').doc('main').set(appData);
  } catch(e) {
    console.error('Firestore save failed:', e);
  }
}

function scheduleSyncToFirestore() {
  if (syncTimeout) clearTimeout(syncTimeout);
  syncTimeout = setTimeout(pushToFirestore, 1500);
}

// ─── Storage helpers (now use appData + Firestore) ─
function loadData() { return appData; }

function saveData(d) {
  appData = d;
  scheduleSyncToFirestore();
}

// WIP stays in localStorage (session-specific, no need to cloud sync)

  try { return JSON.parse(localStorage.getItem('gainz_wip_' + dayId) || 'null'); }

}
function saveWIP(dayId, s) {
  if (s) localStorage.setItem('gainz_wip_' + dayId, JSON.stringify(s));
  else   localStorage.removeItem('gainz_wip_' + dayId);

// HISTORY HELPERS
// ═══════════════════════════════════════════════════
function lastSessionForDay(dayId) {
  return appData.sessions
    .filter(s => s.dayId === dayId)
    .sort((a, b) => {
      // Most recent date first; break ties by completedAt so same-day repeats sort correctly
      if (b.date !== a.date) return b.date.localeCompare(a.date);
      return (b.completedAt || '').localeCompare(a.completedAt || '');
    })[0] || null;
}

function bestSet(sets) {
  if (!sets) return null;
  const valid = sets.filter(s => s.weight > 0 && s.reps > 0);
  if (!valid.length) return null;
  return valid.reduce((b,s) => {
    if (s.weight > b.weight) return s;
    if (s.weight === b.weight && s.reps > b.reps) return s;
    return b;
  });
}

function lastBest(dayId, exId, vKey) {
  const session = lastSessionForDay(dayId);
  if (!session) return null;
  return bestSet(session.exercises?.[exId + '_' + vKey]);
}

  const d = new Date(), dow = d.getDay();
  const mon = new Date(d); mon.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));
  return mon.toISOString().slice(0, 10);
}

  if (h < 17) return 'Good afternoon';
  return 'Good evening';
}

function openDay(dayId) {
  const day = PROGRAM.find(d => d.id === dayId);

  wip = loadWIP(dayId);
  if (!wip || wip.date !== today()) {
    const last = lastSessionForDay(dayId);
    wip = { dayId, date: today(), exercises: {} };
    day.exercises.forEach(ex => {
      const useSwap  = !!(appData.swaps && appData.swaps[ex.id]);
      const vKey     = useSwap && ex.swap ? ex.swap.key : ex.primary.key;
      const sKey     = ex.id + '_' + vKey;
      const lastSets = last?.exercises?.[sKey] || [];
      wip.exercises[sKey] = Array.from({ length: ex.sets }, (_, i) => ({
        weight: lastSets[i]?.weight || '', reps: '', done: false,
      }));
    });
    saveWIP(dayId, wip);
  }
  nav('day', dayId);
}

    const last = lastSessionForDay(dayId);

function renderDay(dayId) {
  if (wip && wip.isCustom) { renderCustomDay(dayId); return; }

  const day = PROGRAM.find(d => d.id === dayId);
  document.getElementById('day-title').textContent = day.name;

  let html = '';
  day.exercises.forEach((ex) => {
    const useSwap = !!(appData.swaps && appData.swaps[ex.id]) && !!ex.swap;
    const variant = useSwap ? ex.swap : ex.primary;
    const vKey    = variant.key;
    const sKey    = ex.id + '_' + vKey;

    if (!wip.exercises[sKey]) {
      const last     = lastSessionForDay(dayId);
      const lastSets = last?.exercises?.[sKey] || [];
      wip.exercises[sKey] = Array.from({ length: ex.sets }, (_, i) => ({
        weight: lastSets[i]?.weight || '', reps: '', done: false,
      }));
      saveWIP(dayId, wip);
    }
    const sets    = wip.exercises[sKey];
    const allDone = sets.length > 0 && sets.every(s => s.done);
    const anyDone = sets.some(s => s.done);

    let swapHtml = '';
    if (ex.swap) {
      swapHtml = `<div class="swap-wrap"><div class="swap-row">
        <button class="swap-btn${!useSwap ? ' active' : ''}" onclick="setSwap('${ex.id}',false)">${ex.primary.name}</button>

      </div></div>`;
    }

    const lb = lastBest(dayId, ex.id, vKey);
    const beatHtml = lb
      ? `<div class="beat-this">🎯 Beat this: <strong>${lb.weight} lbs × ${lb.reps} reps</strong></div>`
      : `<div class="beat-this baseline">No history yet — set your baseline today!</div>`;

    const lastSession = lastSessionForDay(dayId);
    const lastSets    = lastSession?.exercises?.[sKey] || [];

    let setsHtml = `<div class="sets-head"><span>SET</span><span>PREV</span><span>LBS</span><span>REPS</span><span></span></div>`;
    sets.forEach((set, i) => {
      const prev = lastSets[i]?.weight || '—';
      setsHtml += `<div class="set-row${set.done ? ' is-done' : ''}" id="sr-${ex.id}-${i}">
        <div class="set-num">${i + 1}</div>
        <div class="set-prev">${prev}</div>

        <input type="number" inputmode="numeric" class="set-input" placeholder="—"
          value="${set.reps}" ${set.done ? 'disabled' : ''}
          onchange="setVal('${sKey}',${i},'reps',this.value)"/>
        <button class="check-btn${set.done ? ' checked' : ''}" onclick="toggleDone('${sKey}',${i})">${set.done ? '✓' : ''}</button>
      </div>`;
    });

    const restHtml = anyDone && !allDone
      ? `<div class="rest-row">
           <button class="rest-trigger" onclick="openTimer(60)">⏱ 60s rest</button>
           <button class="rest-trigger" onclick="openTimer(90)">⏱ 90s rest</button>

      : '';

    html += `<div class="ex-card${allDone ? ' all-done' : ''}" id="ex-${ex.id}">

        <div class="ex-name">${variant.name}${variant.note ? ` <span class="ex-note">(${variant.note})</span>` : ''}</div>

function setVal(sKey, idx, field, val) {
  const num = parseFloat(val);
  wip.exercises[sKey][idx][field] = isNaN(num) ? '' : num;
  saveWIP(activeDayId, wip);
}

function toggleDone(sKey, idx) {
  wip.exercises[sKey][idx].done = !wip.exercises[sKey][idx].done;
  saveWIP(activeDayId, wip);
  renderDay(activeDayId);
}

function setSwap(exId, useSwap) {
  const d = loadData();
  if (!d.swaps) d.swaps = {};
  d.swaps[exId] = useSwap;
  saveData(d);
  renderDay(activeDayId);
}

function refreshFinishBtn() {
  const anyDone = Object.values(wip.exercises).some(sets => sets.some(s => s.done));
  document.getElementById('finish-btn').disabled = !anyDone;
  const ta = document.getElementById('session-notes');
  if (ta) ta.value = wip.note || '';
}

function saveNote(val) {
  wip.note = val.trim();
  saveWIP(activeDayId, wip);
}

function finishWorkout() {
  if (!wip) return;
  wip.note = (document.getElementById('session-notes')?.value || '').trim();
  const d = loadData();
  d.sessions.push({ ...wip, completedAt: new Date().toISOString() });
  saveData(d);
  saveWIP(activeDayId, null);
  wip = null;
  toast('Workout saved! 💪');
  nav('home');
}

function startBuildWorkout() {
  buildDay = { name: '', exercises: [] };
  editingCustomDayId = null;
  document.getElementById('build-name').value = '';
  nav('build');
}

function editCustomDay(dayId, e) {
  e?.stopPropagation();
  const day = (appData.customDays || []).find(d => d.id === dayId);
  if (!day) return;
  buildDay           = JSON.parse(JSON.stringify(day));
  editingCustomDayId = dayId;
  document.getElementById('build-name').value = day.name;
  nav('build');
}

function cancelBuild() {
  buildDay = null; editingCustomDayId = null;
  nav('home');
}

function renderBuild() {
  const listEl = document.getElementById('build-list');
  if (!buildDay || !buildDay.exercises.length) {
    listEl.innerHTML = `<div class="build-empty">
      <div class="build-empty-icon">🏋️</div>
      Tap <strong>+ Add Exercise</strong> below<br>to build your workout
    </div>`;
    return;
  }
  listEl.innerHTML = buildDay.exercises.map((ex, i) => `
    <div class="build-ex-card">
      <div class="build-ex-top">
        <div class="build-ex-info">
          <div class="build-ex-nm">${ex.name}</div>
          <span class="muscle-chip">${ex.muscle}</span>
        </div>
        <button class="icon-btn" onclick="removeExFromBuild(${i})">✕</button>
      </div>
      <div class="build-ex-cfg">
        <div>
          <div class="cfg-label">Sets</div>
          <div class="sets-stepper">
            <button class="step-btn" onclick="adjustSets(${i},-1)">−</button>
            <div class="step-val">${ex.sets}</div>
            <button class="step-btn" onclick="adjustSets(${i},1)">+</button>
          </div>
        </div>
        <div>
          <div class="cfg-label">Reps</div>
          <input class="cfg-input" type="text" inputmode="text"
            placeholder="e.g. 8–10" value="${ex.reps}"
            onchange="setBuildReps(${i},this.value)" maxlength="12"/>
        </div>
      </div>
    </div>
  `).join('');
}

function adjustSets(i, delta) {
  buildDay.exercises[i].sets = Math.max(1, Math.min(10, buildDay.exercises[i].sets + delta));
  renderBuild();
}
function setBuildReps(i, val) { buildDay.exercises[i].reps = val.trim() || '10'; }
function removeExFromBuild(i) { buildDay.exercises.splice(i, 1); renderBuild(); }

function saveBuildWorkout() {
  const name = document.getElementById('build-name').value.trim();
  if (!name) { toast('Give your workout a name'); return; }
  if (!buildDay.exercises.length) { toast('Add at least one exercise'); return; }
  buildDay.name = name;
  const d = loadData();
  if (!d.customDays) d.customDays = [];
  if (editingCustomDayId) {
    const idx = d.customDays.findIndex(x => x.id === editingCustomDayId);
    if (idx >= 0) d.customDays[idx] = { ...buildDay, id: editingCustomDayId };
  } else {
    buildDay.id = 'cday_' + Date.now();
    d.customDays.push(buildDay);
  }
  saveData(d);
  buildDay = null; editingCustomDayId = null;
  toast(`"${name}" saved!`);
  nav('home');
}

  chipsEl.innerHTML = MUSCLE_GROUPS
    .filter(m => m !== 'Other' || getAllExercises().some(e => e.muscle === 'Other'))
    .map(m => `<button class="chip${pickerFilter===m?' active':''}" onclick="setPickerFilter('${m}')">${m}</button>`)
    .join('');

  const search    = (document.getElementById('picker-search')?.value || '').toLowerCase().trim();
  const exercises = getAllExercises().filter(ex => {
    const matchMuscle = pickerFilter === 'All' || ex.muscle === pickerFilter;
    const matchSearch = !search || ex.name.toLowerCase().includes(search);
    return matchMuscle && matchSearch;
  });

  const listEl = document.getElementById('picker-list');
  let html = exercises.map(ex =>
    `<div class="picker-ex-row" onclick="addExToBuild('${ex.id}')">
      <div class="picker-ex-name">${ex.name}</div>
      <span class="muscle-chip">${ex.muscle}</span>
      <div class="picker-add-icon">+</div>
    </div>`
  ).join('');
  html += `<div class="add-custom-row" onclick="openAddCustomSheet()">
    <div class="add-custom-row-icon">＋</div>
    Add custom exercise…
  </div>`;
  listEl.innerHTML = html || '<div class="no-data">No exercises found.</div>';
}

function addExToBuild(exId) {
  const ex = getAllExercises().find(e => e.id === exId);
  if (!ex || !buildDay) return;
  buildDay.exercises.push({ id:'bex_'+Date.now(), libId:ex.id, name:ex.name, muscle:ex.muscle, sets:3, reps:'10' });
  renderBuild();
  closePicker();
  toast(`${ex.name} added`);
}

// ═══════════════════════════════════════════════════
// CUSTOM EXERCISE
// ═══════════════════════════════════════════════════
function openAddCustomSheet() {
  document.getElementById('custom-ex-name').value = '';
  document.getElementById('custom-ex-overlay').classList.remove('hidden');
}
function closeCustomExSheet() { document.getElementById('custom-ex-overlay').classList.add('hidden'); }

function saveCustomEx() {
  const name = document.getElementById('custom-ex-name').value.trim();
  if (!name) { toast('Enter an exercise name'); return; }
  const muscle = document.getElementById('custom-ex-muscle').value;
  const d = loadData();
  if (!d.customExercises) d.customExercises = [];
  d.customExercises.push({ id:'cex_'+Date.now(), name, muscle });
  saveData(d);
  closeCustomExSheet();
  renderPicker();
  toast(`"${name}" added to library`);
}

// ═══════════════════════════════════════════════════
// REST TIMER
// ═══════════════════════════════════════════════════
function openTimer(seconds) {
  timerDuration = seconds; timerLeft = seconds;
  document.getElementById('timer-overlay').classList.remove('hidden');
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  tickTimer();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timerLeft--;
    if (timerLeft <= 0) {
      timerLeft = 0; tickTimer(); clearInterval(timerInterval); timerInterval = null;
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      setTimeout(closeTimer, 800);
    } else { tickTimer(); }
  }, 1000);
}
function setTimer(sec) { if (timerInterval) clearInterval(timerInterval); openTimer(sec); }
function tickTimer() {
  const mins = Math.floor(timerLeft / 60), secs = timerLeft % 60;
  document.getElementById('ring-time').textContent =
    timerLeft >= 60 ? `${mins}:${secs.toString().padStart(2,'0')}` : timerLeft;
  document.getElementById('ring-fg').style.strokeDashoffset = CIRC * (1 - timerLeft / timerDuration);
}
function closeTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  document.getElementById('timer-overlay').classList.add('hidden');
}

// ═══════════════════════════════════════════════════
// TRAINING WEEK HELPERS
// ═══════════════════════════════════════════════════
function getTrainingWeeks(sessions) {
  if (!sessions.length) return [];
  const sorted = [...sessions].sort((a,b) => a.date.localeCompare(b.date));
  const first  = new Date(sorted[0].date + 'T12:00:00');
  const dow    = first.getDay();
  const mon    = new Date(first);
  mon.setDate(first.getDate() - (dow === 0 ? 6 : dow - 1));
  const weeks = [], now = new Date();
  let cur = new Date(mon), num = 1;
  while (cur <= now && num <= 20) {
    const end = new Date(cur); end.setDate(cur.getDate() + 6);
    weeks.push({ num, start: cur.toISOString().slice(0,10), end: end.toISOString().slice(0,10) });
    cur = new Date(cur); cur.setDate(cur.getDate() + 7); num++;
  }
  return weeks;
}

function buildWeekSel(selId, sessions) {
  const sel   = document.getElementById(selId);
  const weeks = getTrainingWeeks(sessions);
  const fmt   = s => { const d = new Date(s+'T12:00:00'); return `${d.getMonth()+1}/${d.getDate()}`; };
  sel.innerHTML = '<option value="all">All time</option>';
  weeks.forEach(w => {
    sel.innerHTML += `<option value="${w.start}|${w.end}">Week ${w.num} &nbsp;(${fmt(w.start)}–${fmt(w.end)})</option>`;
  });
  sel.style.display = weeks.length > 1 ? 'block' : 'none';
}

function weekFilteredPts(pts, selId) {
  const val = document.getElementById(selId)?.value;
  if (!val || val === 'all') return pts;
  const [start, end] = val.split('|');
  return pts.filter(p => p.date >= start && p.date <= end);
}

// ═══════════════════════════════════════════════════
// PROGRESS VIEW
// ═══════════════════════════════════════════════════
function renderProgress() {
  buildWeekSel('bw-week-sel', appData.sessions);
  renderBWChart();

  const daySel = document.getElementById('day-sel');
  daySel.innerHTML = '<option value="">— Select a day —</option>';
  PROGRAM.forEach(d => {
    daySel.innerHTML += `<option value="${d.id}">${d.label}: ${d.name}</option>`;
  });
  const customDays = appData.customDays || [];
  if (customDays.length) {
    daySel.innerHTML += '<option disabled>── My Workouts ──</option>';
    customDays.forEach(d => {
      daySel.innerHTML += `<option value="${d.id}">⚡ ${d.name}</option>`;
    });
  }
  document.getElementById('ex-sel').style.display = 'none';
  document.getElementById('week-sel').style.display = 'none';
  document.getElementById('strength-chart').innerHTML = '';
}

function updateExSel() {
  const dayId = document.getElementById('day-sel').value;
  const exSel = document.getElementById('ex-sel');
  exSel.innerHTML = '<option value="">— Select an exercise —</option>';
  exSel.style.display = dayId ? 'block' : 'none';
  document.getElementById('week-sel').style.display = 'none';
  document.getElementById('strength-chart').innerHTML = '';
  if (!dayId) return;

  const customDay = (appData.customDays || []).find(d => d.id === dayId);
  if (customDay) {
    customDay.exercises.forEach(ex => {
      exSel.innerHTML += `<option value="${ex.id}|custom">${ex.name}</option>`;
    });
    return;
  }
  const day = PROGRAM.find(d => d.id === dayId);
  if (!day) return;
  day.exercises.forEach(ex => {
    exSel.innerHTML += `<option value="${ex.id}|p">${ex.primary.name}</option>`;
    if (ex.swap) exSel.innerHTML += `<option value="${ex.id}|s">↳ ${ex.swap.name}</option>`;
  });
}

function updateStrengthWeekSel() {
  buildWeekSel('week-sel', appData.sessions);
  renderStrengthChart();
}

function renderStrengthChart() {
  const val     = document.getElementById('ex-sel').value;
  const chartEl = document.getElementById('strength-chart');
  if (!val) { chartEl.innerHTML = ''; return; }

  const [exId, vKey] = val.split('|');
  const dayId = document.getElementById('day-sel').value;
  const sKey  = vKey === 'custom' ? exId : exId + '_' + vKey;

  const allPts = appData.sessions
    .filter(s => s.dayId === dayId && s.exercises?.[sKey])
    .map(s => { const b = bestSet(s.exercises[sKey]); return b ? { date: s.date, value: b.weight, reps: b.reps } : null; })
    .filter(Boolean)
    .sort((a,b) => a.date.localeCompare(b.date));

  const points = weekFilteredPts(allPts, 'week-sel');
  chartEl.innerHTML = points.length
    ? svgChart(points, 'lbs')
    : '<div class="no-data">No data for this selection yet.</div>';
}

function logBW() {
  const input = document.getElementById('bw-input');
  const val   = parseFloat(input.value);
  if (!val || val < 50 || val > 500) { toast('Enter a weight between 50–500 lbs'); return; }
  const d = loadData();
  if (!d.bodyweight) d.bodyweight = [];
  const t = today();
  const i = d.bodyweight.findIndex(b => b.date === t);
  if (i >= 0) d.bodyweight[i].weight = val;
  else d.bodyweight.push({ date: t, weight: val });
  saveData(d);
  input.value = ''; input.blur();
  toast(`Logged ${val} lbs`);
  renderBWChart();
}

function renderBWChart() {
  const chartEl = document.getElementById('bw-chart');
  const allPts  = (appData.bodyweight || [])
    .sort((a,b) => a.date.localeCompare(b.date))
    .map(b => ({ date: b.date, value: b.weight }));
  const pts = weekFilteredPts(allPts, 'bw-week-sel');
  chartEl.innerHTML = allPts.length
    ? (pts.length ? svgChart(pts, 'lbs') : '<div class="no-data">No bodyweight entries in this week.</div>')
    : '<div class="no-data">Log your first bodyweight above to see your trend!</div>';
}

// ═══════════════════════════════════════════════════
// SVG CHART
// ═══════════════════════════════════════════════════
function svgChart(pts, unit) {
  const W = 320, H = 140;
  const pad = { t:16, r:12, b:28, l:44 };
  const iW  = W - pad.l - pad.r, iH = H - pad.t - pad.b;
  const vals = pts.map(p => p.value);
  const mn   = Math.min(...vals), mx = Math.max(...vals), rng = mx - mn || 1;
  const toX  = i => pad.l + (i / Math.max(pts.length - 1, 1)) * iW;
  const toY  = v => pad.t + iH - ((v - mn) / rng) * iH;
  const pathD = pts.map((p,i) => `${i===0?'M':'L'}${toX(i).toFixed(1)},${toY(p.value).toFixed(1)}`).join(' ');
  const fillD = pathD + ` L${toX(pts.length-1).toFixed(1)},${(pad.t+iH).toFixed(1)} L${toX(0).toFixed(1)},${(pad.t+iH).toFixed(1)} Z`;
  const yTicks = [mx, (mn+mx)/2, mn], yPos = [pad.t, pad.t+iH/2, pad.t+iH];
  const xIdxs = pts.length <= 3 ? pts.map((_,i)=>i) : [0, Math.round((pts.length-1)/2), pts.length-1];
  const fmtDate = s => { const d = new Date(s+'T12:00:00'); return `${d.getMonth()+1}/${d.getDate()}`; };

  let svg = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block;background:var(--card2);border-radius:8px">
    <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </linearGradient></defs>`;
  yTicks.forEach((v,i) => {
    svg += `<line x1="${pad.l}" y1="${yPos[i]}" x2="${W-pad.r}" y2="${yPos[i]}" stroke="#2e2e2e" stroke-width="1"/>
      <text x="${pad.l-6}" y="${yPos[i]+4}" text-anchor="end" fill="#666" font-size="10" font-family="-apple-system,sans-serif">${Math.round(v)}</text>`;
  });
  if (pts.length > 1) svg += `<path d="${fillD}" fill="url(#cg)"/>`;
  svg += `<path d="${pathD}" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
  pts.forEach((p,i) => { svg += `<circle cx="${toX(i).toFixed(1)}" cy="${toY(p.value).toFixed(1)}" r="4" fill="#4ade80" stroke="#1c1c1c" stroke-width="2"/>`; });
  xIdxs.forEach(i => { svg += `<text x="${toX(i).toFixed(1)}" y="${H-5}" text-anchor="middle" fill="#666" font-size="10" font-family="-apple-system,sans-serif">${fmtDate(pts[i].date)}</text>`; });
  svg += '</svg>';
  return svg;
}

// ═══════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════
let toastTimer = null;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

// Service worker (keep for offline PWA support)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
